<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Torneo E-sports</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏆 Torneo E-sports 2026</h1>
    </header>
    <main>
        <form id="registroForm">
            <input type="text" id="nombre" placeholder="Nombre del Jugador" required>
            <input type="email" id="email" placeholder="Email" required>
            <select id="equipo">
                <option value="1">Titanes del Norte</option>
                <option value="2">Fénix Gaming</option>
            </select>
            <button type="submit">Inscribirse</button>
        </form>
    </main>
    <script src="app.js"></script>
</body>
</html>
